<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{% block title %}any-sign{% endblock %}</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<script>
		tailwind.config = {
			theme: {
				extend: {
					colors: {
						primary: { 50: '#EEF2FF', 100: '#E0E7FF', 500: '#6366F1', 600: '#4F46E5', 700: '#4338CA' },
						sidebar: { DEFAULT: '#1E293B', hover: '#334155', active: '#4F46E5' },
					}
				}
			}
		}
	</script>
	<style>
		[x-cloak] { display: none !important; }
		.toast { animation: toastIn 0.25s ease-out, toastOut 0.25s ease-in 2.75s forwards; }
		@keyframes toastIn { from { transform: translateY(-8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
		@keyframes toastOut { to { opacity: 0; transform: translateY(-8px); } }
	</style>
</head>
<body class="h-full bg-gray-50 text-slate-900">
	<!-- Mobile overlay -->
	<div id="sidebar-overlay" class="fixed inset-0 bg-black/40 z-40 hidden md:hidden" onclick="toggleSidebar()"></div>

	<div class="min-h-full flex">
		<!-- Sidebar -->
		<aside id="sidebar" class="w-60 bg-sidebar flex flex-col fixed h-full z-50 transition-transform duration-200 -translate-x-full md:translate-x-0">
			<div class="px-5 py-5">
				<h1 class="text-lg font-semibold text-white">AnyRouter</h1>
				<p class="text-xs text-slate-400 mt-0.5">Check-in Manager</p>
			</div>
			<nav class="flex-1 px-3 space-y-1">
				<a href="/" class="flex items-center px-3 py-2.5 rounded-lg text-sm font-medium transition-colors duration-150
					{% if active_page == 'dashboard' %}bg-primary-600 text-white{% else %}text-slate-300 hover:bg-sidebar-hover hover:text-white{% endif %}">
					<svg class="w-5 h-5 mr-3 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25a2.25 2.25 0 01-2.25-2.25v-2.25z"/></svg>
					仪表盘
				</a>
				<a href="/accounts" class="flex items-center px-3 py-2.5 rounded-lg text-sm font-medium transition-colors duration-150
					{% if active_page == 'accounts' %}bg-primary-600 text-white{% else %}text-slate-300 hover:bg-sidebar-hover hover:text-white{% endif %}">
					<svg class="w-5 h-5 mr-3 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/></svg>
					账号管理
				</a>
				<a href="/providers" class="flex items-center px-3 py-2.5 rounded-lg text-sm font-medium transition-colors duration-150
					{% if active_page == 'providers' %}bg-primary-600 text-white{% else %}text-slate-300 hover:bg-sidebar-hover hover:text-white{% endif %}">
					<svg class="w-5 h-5 mr-3 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 14.25h13.5m-13.5 0a3 3 0 01-3-3m3 3a3 3 0 100 6h13.5a3 3 0 100-6m-16.5-3a3 3 0 013-3h13.5a3 3 0 013 3m-19.5 0a4.5 4.5 0 01.9-2.7L5.737 5.1a3.375 3.375 0 012.7-1.35h7.126c1.062 0 2.062.5 2.7 1.35l2.587 3.45a4.5 4.5 0 01.9 2.7"/></svg>
					Provider 管理
				</a>
				<a href="/logs" class="flex items-center px-3 py-2.5 rounded-lg text-sm font-medium transition-colors duration-150
					{% if active_page == 'logs' %}bg-primary-600 text-white{% else %}text-slate-300 hover:bg-sidebar-hover hover:text-white{% endif %}">
					<svg class="w-5 h-5 mr-3 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
					执行日志
				</a>
			</nav>
			<div class="px-3 py-4 border-t border-slate-700">
				<a href="/logout" class="flex items-center px-3 py-2.5 rounded-lg text-sm font-medium text-slate-400 hover:bg-sidebar-hover hover:text-white transition-colors duration-150">
					<svg class="w-5 h-5 mr-3 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/></svg>
					退出登录
				</a>
			</div>
		</aside>

		<!-- Main content -->
		<div class="flex-1 md:ml-60 flex flex-col min-h-screen">
			<!-- Mobile top bar -->
			<header class="sticky top-0 z-30 bg-white border-b border-gray-200 px-4 py-3 flex items-center md:hidden">
				<button onclick="toggleSidebar()" class="p-1.5 -ml-1 rounded-lg text-slate-500 hover:bg-gray-100 hover:text-slate-700 transition-colors">
					<svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
				</button>
				<span class="ml-3 text-sm font-semibold text-slate-900">AnyRouter</span>
			</header>
			<main class="flex-1 p-4 sm:p-6 lg:p-8">
				{% block content %}{% endblock %}
			</main>
		</div>
	</div>

	<div id="toast-container" class="fixed top-4 right-4 z-[60] space-y-2"></div>

	<script>
	function toggleSidebar() {
		const sidebar = document.getElementById('sidebar');
		const overlay = document.getElementById('sidebar-overlay');
		const isOpen = !sidebar.classList.contains('-translate-x-full');
		if (isOpen) {
			sidebar.classList.add('-translate-x-full');
			overlay.classList.add('hidden');
		} else {
			sidebar.classList.remove('-translate-x-full');
			overlay.classList.remove('hidden');
		}
	}
	</script>
	<script src="/static/app.js"></script>
	{% block scripts %}{% endblock %}
</body>
</html>
