<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>登录 - any-sign</title>
	<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full bg-gray-50 flex items-center justify-center p-4">
	<div class="w-full max-w-sm">
		<div class="text-center mb-8">
			<div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-indigo-600 mb-4">
				<svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/></svg>
			</div>
			<h1 class="text-xl font-semibold text-slate-900">any-sign</h1>
			<p class="text-sm text-slate-500 mt-1">请输入管理密码以继续</p>
		</div>

		<div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
			{% if error %}
			<div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm font-medium">{{ error }}</div>
			{% endif %}
			<form method="post" action="/login">
				<div class="mb-5">
					<label for="password" class="block text-sm font-medium text-slate-700 mb-1.5">管理密码</label>
					<input type="password" name="password" id="password" placeholder="输入密码" required autofocus
						class="w-full px-3.5 py-2.5 bg-white border border-gray-300 rounded-lg text-slate-900 text-sm placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow">
				</div>
				<button type="submit"
					class="w-full bg-indigo-600 text-white py-2.5 rounded-lg text-sm font-medium hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transition-colors cursor-pointer">
					登录
				</button>
			</form>
		</div>
	</div>
</body>
</html>
